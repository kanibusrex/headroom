name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build and package Headroom.app
        run: ./build-app.sh

      - name: Zip app bundle
        run: ditto -c -k --keepParent Headroom.app Headroom.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Headroom
          path: Headroom.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" Headroom.zip --generate-notes
